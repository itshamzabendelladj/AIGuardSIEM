title: Credential Dumping via Mimikatz
id: 10101010-1010-1010-1010-101010101010
status: stable
description: Detects credential dumping attempts using Mimikatz or similar tools
author: AIGuard Security Team
license: MIT
level: critical
tags:
  - attack.credential_access
  - attack.t1003
  - attack.t1003.001
detection:
  selection:
    process.name|contains:
      - mimikatz
      - procdump
      - lsass
    process.command_line|contains:
      - "sekurlsa"
      - "lsadump"
      - "-ma lsass"
  condition: selection
falsepositives:
  - Legitimate forensic tools
