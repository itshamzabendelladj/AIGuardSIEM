apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: aiguard-siem
  labels:
    app: clickhouse
    component: storage-warm
spec:
  serviceName: clickhouse
  replicas: 3
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
        component: storage-warm
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:23.8
          ports:
            - containerPort: 8123
              name: http
            - containerPort: 9000
              name: tcp
          env:
            - name: CLICKHOUSE_DB
              value: aiguard
            - name: CLICKHOUSE_USER
              value: aiguard
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aiguard-secrets
                  key: clickhouse-password
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
            limits:
              memory: "16Gi"
              cpu: "4"
          volumeMounts:
            - name: clickhouse-data
              mountPath: /var/lib/clickhouse
  volumeClaimTemplates:
    - metadata:
        name: clickhouse-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 500Gi
        storageClassName: fast-ssd
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: aiguard-siem
spec:
  selector:
    app: clickhouse
  ports:
    - port: 8123
      targetPort: 8123
      name: http
    - port: 9000
      targetPort: 9000
      name: tcp
  clusterIP: None
